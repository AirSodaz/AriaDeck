name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  CARGO_INCREMENTAL: "0"

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      # Node 24-native actions (avoids Node 20 deprecation force-upgrade warnings).
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euxo pipefail
          sudo apt-get update
          # GPUI / desktop (subset of Zed script/linux) + tray / notify / keyring.
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            cmake \
            libasound2-dev \
            libdbus-1-dev \
            libfontconfig-dev \
            libgtk-3-dev \
            libssl-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libzstd-dev \
            pkg-config \
            libayatana-appindicator3-dev \
            libsecret-1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96"
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Keep caches distinct per OS (and shared key space per workflow job).
          key: ${{ matrix.os }}
          shared-key: workspace

      - name: Format
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all --check

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Release build (desktop)
        run: cargo build -p ariadeck-desktop --release

  windows-packages:
    name: Windows packages (portable + installer)
    runs-on: windows-latest
    needs: verify
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-latest
          shared-key: workspace

      - name: Generate third-party notices
        run: python scripts/gen_third_party_notices.py

      - name: Package portable
        shell: pwsh
        run: ./scripts/package-windows-portable.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install innosetup --no-progress -y
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "choco install innosetup failed (exit $LASTEXITCODE); retrying once..."
            choco install innosetup --no-progress -y --force
          }
          if ($LASTEXITCODE -ne 0) { throw "choco install innosetup failed (exit $LASTEXITCODE)" }
          $iscc = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe",
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe not found after installing Inno Setup" }
          Write-Host "ISCC: $iscc"

      - name: Package installer
        shell: pwsh
        run: ./scripts/package-windows-installer.ps1 -SkipStage

      - name: Verify Windows package artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zip = Get-ChildItem -Path dist -Filter "*-windows-x64-portable.zip" -ErrorAction SilentlyContinue
          $setup = Get-ChildItem -Path dist -Filter "*-windows-x64-setup.exe" -ErrorAction SilentlyContinue
          if (-not $zip) { throw "Missing portable zip under dist/" }
          if (-not $setup) { throw "Missing Inno setup.exe under dist/" }
          foreach ($f in @($zip[0], $setup[0])) {
            $mb = [math]::Round($f.Length / 1MB, 2)
            Write-Host "OK $($f.Name) ($mb MB)"
          }

      - name: Upload Windows artifacts
        # v5 still targets Node 20; v6+ is node24-native.
        uses: actions/upload-artifact@v6
        with:
          name: ariadeck-windows-x64
          path: dist/*
