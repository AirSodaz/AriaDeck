name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  CARGO_INCREMENTAL: "0"

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      # Node 24-native actions (avoids Node 20 deprecation force-upgrade warnings).
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euxo pipefail
          sudo apt-get update
          # GPUI / desktop (subset of Zed script/linux) + tray / notify / keyring.
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            cmake \
            libasound2-dev \
            libdbus-1-dev \
            libfontconfig-dev \
            libgtk-3-dev \
            libssl-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libzstd-dev \
            pkg-config \
            libayatana-appindicator3-dev \
            libsecret-1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96"
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Keep caches distinct per OS (and shared key space per workflow job).
          key: ${{ matrix.os }}
          shared-key: workspace

      - name: Format
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all --check

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Release build (desktop)
        run: cargo build -p ariadeck-desktop --release

  portable:
    name: portable package
    runs-on: windows-latest
    needs: verify
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-latest
          shared-key: workspace

      - name: Generate third-party notices
        run: python scripts/gen_third_party_notices.py

      - name: Package portable
        shell: pwsh
        run: ./scripts/package-windows-portable.ps1

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Package installer
        shell: pwsh
        run: ./scripts/package-windows-installer.ps1 -SkipStage

      - name: Upload Windows artifacts
        # v5 still targets Node 20; v6+ is node24-native.
        uses: actions/upload-artifact@v6
        with:
          name: ariadeck-windows-x64
          path: dist/*
