name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  windows-package:
    name: Windows release packages
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      # actions/checkout@v5 runs on Node 24 (avoids Node 20 deprecation warnings).
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Generate third-party notices
        run: python scripts/gen_third_party_notices.py

      - name: Package portable
        shell: pwsh
        run: |
          $sign = $false
          if ($env:ARIADECK_SIGN_CERT_THUMBPRINT -or $env:ARIADECK_SIGN_PFX) {
            $sign = $true
          }
          if ($sign) {
            ./scripts/package-windows-portable.ps1 -Sign
          } else {
            ./scripts/package-windows-portable.ps1
          }
        env:
          ARIADECK_SIGN_TOOL: ${{ secrets.ARIADECK_SIGN_TOOL }}
          ARIADECK_SIGN_CERT_THUMBPRINT: ${{ secrets.ARIADECK_SIGN_CERT_THUMBPRINT }}
          ARIADECK_SIGN_PFX: ${{ secrets.ARIADECK_SIGN_PFX }}
          ARIADECK_SIGN_PFX_PASSWORD: ${{ secrets.ARIADECK_SIGN_PFX_PASSWORD }}
          ARIADECK_SIGN_DESCRIPTION: AriaDeck

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install innosetup --no-progress -y
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "choco install innosetup failed (exit $LASTEXITCODE); retrying once..."
            choco install innosetup --no-progress -y --force
          }
          if ($LASTEXITCODE -ne 0) { throw "choco install innosetup failed (exit $LASTEXITCODE)" }
          $iscc = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe",
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe not found after installing Inno Setup" }
          Write-Host "ISCC: $iscc"

      - name: Package installer
        shell: pwsh
        run: |
          $arguments = @("-SkipStage")
          if ($env:ARIADECK_SIGN_CERT_THUMBPRINT -or $env:ARIADECK_SIGN_PFX) {
            $arguments += "-Sign"
          }
          ./scripts/package-windows-installer.ps1 @arguments
        env:
          ARIADECK_SIGN_TOOL: ${{ secrets.ARIADECK_SIGN_TOOL }}
          ARIADECK_SIGN_CERT_THUMBPRINT: ${{ secrets.ARIADECK_SIGN_CERT_THUMBPRINT }}
          ARIADECK_SIGN_PFX: ${{ secrets.ARIADECK_SIGN_PFX }}
          ARIADECK_SIGN_PFX_PASSWORD: ${{ secrets.ARIADECK_SIGN_PFX_PASSWORD }}
          ARIADECK_SIGN_DESCRIPTION: AriaDeck

      - name: Verify Windows package artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zip = Get-ChildItem -Path dist -Filter "*-windows-x64-portable.zip" -ErrorAction SilentlyContinue
          $setup = Get-ChildItem -Path dist -Filter "*-windows-x64-setup.exe" -ErrorAction SilentlyContinue
          if (-not $zip) { throw "Missing portable zip under dist/" }
          if (-not $setup) { throw "Missing Inno setup.exe under dist/" }
          foreach ($f in @($zip[0], $setup[0])) {
            $mb = [math]::Round($f.Length / 1MB, 2)
            Write-Host "OK $($f.Name) ($mb MB)"
          }

      - name: Upload artifacts
        # v5 still targets Node 20; v6+ is node24-native.
        uses: actions/upload-artifact@v6
        with:
          name: ariadeck-windows-x64
          path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*-setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
